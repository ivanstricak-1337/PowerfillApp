workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      # Let Codemagic use default JDK
      android: true
      gradle: true
    scripts:
      - name: Build APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
