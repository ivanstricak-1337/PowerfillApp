workflows:
  powerfill-android:
    name: Powerfill Android Workflow
    max_build_duration: 60
    scripts:
      # 1️⃣ Clean and build Debug APK
      - name: Clean & Build Debug APK
        script: ./gradlew clean assembleDebug

      # 2️⃣ Optional Release APK build (skipped if no signing)
      - name: Build Release APK
        script: ./gradlew assembleRelease || echo "Release build skipped (no signing config)"

    # 3️⃣ Artifacts to collect
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
      - app/build/outputs/apk/release/app-release.apk
